version: "3.9"

services:
  hms-db:
    image: postgres:16-alpine
    container_name: hms-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cas-network
    labels:
      - "traefik.enable=false"

  hms-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      hms-db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/public/uploads
      - ./logs:/app/logs
    
    # FIXED: More reliable healthcheck for Next.js
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hms-router.rule=Host(`hms.radhakrishnajewellery.in`)"
      - "traefik.http.routers.hms-router.entrypoints=web,websecure"
      - "traefik.http.routers.hms-router.tls=true"
      - "traefik.http.routers.hms-router.tls.certresolver=cert-resolver"
      - "traefik.http.routers.hms-router.middlewares=compression,custom-headers"
      - "traefik.http.services.hms-service.loadbalancer.server.port=3000"
      - "traefik.docker.network=cas-network"
      
      # Compression middleware
      - "traefik.http.middlewares.compression.compress.enabled=true"
      
      # Security headers
      - "traefik.http.middlewares.custom-headers.headers.customResponseHeaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.custom-headers.headers.customResponseHeaders.X-Frame-Options=DENY"
      - "traefik.http.middlewares.custom-headers.headers.customResponseHeaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.custom-headers.headers.customResponseHeaders.Referrer-Policy=strict-origin-when-cross-origin"

    networks:
      - cas-network

volumes:
  postgres_data:
    driver: local

networks:
  # FIXED: Remove external declaration if Traefik creates it
  # If Traefik is in separate docker-compose.yml, keep external: true
  cas-network:
    external: true
    name: cas-network