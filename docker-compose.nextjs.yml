version: "3.9"

services:
  hms-db:
    image: postgres:16-alpine
    container_name: hms-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cas-network
    labels:
      - "traefik.enable=false"

  hms-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: ${NODE_ENV}
      SESSION_INACTIVITY_TIMEOUT: ${SESSION_INACTIVITY_TIMEOUT}
      SESSION_CHECK_INTERVAL: ${SESSION_CHECK_INTERVAL}
    depends_on:
      hms-db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/public/uploads
      - ./logs:/app/logs

    networks:
      - cas-network

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hms-router.rule=Host(`hms.radhakrishnajewellery.in`)"
      - "traefik.http.routers.hms-router.entrypoints=websecure"
      - "traefik.http.routers.hms-router.tls=true"
      - "traefik.http.routers.hms-router.tls.certresolver=cert-resolver"
      - "traefik.http.services.hms-service.loadbalancer.server.port=3000"
      - "traefik.docker.network=cas-network"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # FIXED: More reliable healthcheck for Next.js
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  hms-cron:
    image: alpine:latest
    container_name: hms-cron
    restart: unless-stopped
    depends_on:
      hms-app:
        condition: service_healthy
    command: >
      sh -c "apk add --no-cache curl &&
      echo '0 2 * * * curl -X GET http://hms-app:3000/api/cron/maintenance -H \"Authorization: Bearer $${CRON_SECRET}\" >> /var/log/cron.log 2>&1' > /etc/crontabs/root &&
      echo '30 2 * * * curl -X GET http://hms-app:3000/api/cron/cleanup -H \"Authorization: Bearer $${CRON_SECRET}\" >> /var/log/cron.log 2>&1' >> /etc/crontabs/root &&
      echo '* * * * * curl -X GET http://hms-app:3000/api/cron/test -H \"Authorization: Bearer $${CRON_SECRET}\" >> /var/log/cron.log 2>&1' >> /etc/crontabs/root &&
      echo '* * * * * sleep 20 && curl -X GET http://hms-app:3000/api/cron/test -H \"Authorization: Bearer $${CRON_SECRET}\" >> /var/log/cron.log 2>&1' >> /etc/crontabs/root &&
      echo '* * * * * sleep 40 && curl -X GET http://hms-app:3000/api/cron/test -H \"Authorization: Bearer $${CRON_SECRET}\" >> /var/log/cron.log 2>&1' >> /etc/crontabs/root &&
      crond -f -d 8"
    environment:
      CRON_SECRET: ${CRON_SECRET}
    networks:
      - cas-network

  hms-nginx:
    image: nginx:alpine
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hms-uploads-router.rule=Host(`hms.radhakrishnajewellery.in`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.hms-uploads-router.entrypoints=web,websecure"
      - "traefik.http.routers.hms-uploads-router.tls=true"
      - "traefik.http.routers.hms-uploads-router.tls.certresolver=cert-resolver"
      - "traefik.http.routers.hms-uploads-router.priority=100"
      - "traefik.http.services.hms-nginx-service.loadbalancer.server.port=80"
      - "traefik.docker.network=cas-network"
    networks:
      - cas-network

volumes:
  postgres_data:
    driver: local

networks:
  # FIXED: Remove external declaration if Traefik creates it
  # If Traefik is in separate docker-compose.yml, keep external: true
  cas-network:
    external: true
    name: cas-network
