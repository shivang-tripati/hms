version: "3.9"

services:
  hms-db:
    image: postgres:16-alpine
    container_name: hms-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - cas-network 

    labels:
      - "traefik.enable=false"
      

  hms-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-app
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: ${NODE_ENV}
    depends_on:
      hms-db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/public/uploads
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    labels:
      - "traefik.enable=true"
      # Main router for next.js app
      - "traefik.http.routers.hms-router.rule=Host(${NEXT_PUBLIC_APP_URL})"
      - "traefik.http.routers.hms-router.entrypoints=web, websecure"
      - "traefik.http.routers.hms-router.tls=true"
      - "traefik.http.routers.hms-router.tls.certresolver=letsencrypt"
      - "traefik.http.services.hms-service.loadbalancer.server.port=3000"
      - "traefik.docker.network=cas-network"
      # Optional: Add compression middleware
      - "traefik.http.middlewares.compression.compress.enabled=true"
      # Optional: Add custom headers for security
      - "traefik.http.middlewares.custom-headers.headers.customrequestheaders.X-Content-Type-Options=nosniff"
      - "traefik.http.middlewares.custom-headers.headers.customrequestheaders.X-Frame-Options=DENY"
      - "traefik.http.middlewares.custom-headers.headers.customrequestheaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.custom-headers.headers.customrequestheaders.Referrer-Policy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.custom-headers.headers.customrequestheaders.Content-Security-Policy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self';"

      # Optional: Rate limiting
      - "traefik.http.middlewares.rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"

    networks:
      - cas-network 
      
      

volumes:
  postgres_data:
    driver: local


networks:
  cas-network:
    external: true
    name: cas-network
