# docker-compose.dev.yml (for testing without Traefik)
version: "3.9"

services:
  hms-db:
    image: postgres:16-alpine
    container_name: hms-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"  # Expose for debugging
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hms-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-app
    restart: unless-stopped
    ports:
      - "3001:3001"  # Map host port 3001 to container port 3001
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: http://localhost:3001  # For local testing
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: http://localhost:3001
      NODE_ENV: development
      PORT: 3001
    depends_on:
      hms-db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/public/uploads
      - ./logs:/app/logs

volumes:
  postgres_data:
    driver: local